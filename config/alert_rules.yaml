alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 8000 for 5m
    threshold_ms: 8000
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    threshold_pct: 5
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    condition: cost_total_usd > 0.50 for session
    threshold_usd: 0.50
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
